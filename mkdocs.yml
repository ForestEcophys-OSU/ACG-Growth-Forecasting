site_name: 'Forest Growth Tropical Dry Forest'
site_description: 'TDF GR 2026'
site_author: German Vargas G.
site_url: https://ForestEcophys-OSU.github.io/ACG-Growth-Forecasting

# Repository
repo_name: ACG-Growth-Forecasting
repo_url: https://github.com/ForestEcophys-OSU/ACG-Growth-Forecasting.git
edit_uri: edit/main/docs/
# Copyright
copyright: 'Copyright &copy; 2026 Oregon State University'

# Page tree
nav:
  - Home: index.md
  - Codefest Teams: teams.md
  - Pre-event virtual meetings: virtual-meetings.md
  - Breakout prompts: breakout.md
  - Data library:
       - Dendrometer data: data-library/dendrometer-data-library.md
  - Project documentation:
       - Methods: project-documentation/methods.md
  - Publications:
       - Citations: resources/citations.md

# Configuration
theme:
  highlightjs: true
  name: material
  font:
    text: 'Open Sans'
    code: 'Roboto Mono'
  logo: 'assets/esiil_content/ESIIL_logo.png'
  favicon: 'assets/esiil_content/favicon.ico'
  # setting features for the navigation tab
  features:
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - toc.follow
    - content.code.copy
  # Default values, taken from mkdocs_theme.yml
  language: en
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: white)"
      primary: 'white'
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference

# Options
extra:
  social:
    - icon: fontawesome/brands/github
    # link: https://github.com/ForestEcophys-OSU

extra_css:
  - stylesheets/extra.css

plugins:
    - search
    - mkdocstrings
    - git-revision-date
    - ipynb
